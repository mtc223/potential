// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════

const getLPCUrl = (lpcPath) => {
  if (!lpcPath) return null;
  const encoded = lpcPath.split('/').map(p => encodeURIComponent(p)).join('/');
  return LPC_BASE + encoded;
};

const loadStorage = (key, fallback) => {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
};
const saveStorage = (key, val) => {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
};

const formatTime = (iso) => {
  const d = new Date(iso);
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
};

// ═══════════════════════════════════════════════════════════
// PIXEL EDITOR
// ═══════════════════════════════════════════════════════════

function PixelEditor({ asset, editedUrl, onSave, onClose }) {
  const canvasRef = useRef(null);
  const [zoom, setZoom] = useState(8);
  const [tool, setTool] = useState('pencil');
  const [color, setColor] = useState('#ffffff');
  const [imgWidth, setImgWidth] = useState(0);
  const [imgHeight, setImgHeight] = useState(0);
  const [pixelData, setPixelData] = useState(null);
  const [undoStack, setUndoStack] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [error, setError] = useState(false);
  const isDrawing = useRef(false);

  const url = editedUrl || getLPCUrl(asset.lpcPath);

  useEffect(() => {
    if (!url) { setError(true); return; }
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const oc = document.createElement('canvas');
      oc.width = img.width; oc.height = img.height;
      const ctx = oc.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const id = ctx.getImageData(0, 0, img.width, img.height);
      setPixelData(new Uint8ClampedArray(id.data));
      setImgWidth(img.width); setImgHeight(img.height);
      setLoaded(true);
    };
    img.onerror = () => setError(true);
    img.src = url;
  }, [url]);

  const renderCanvas = useCallback(() => {
    if (!canvasRef.current || !pixelData || !imgWidth) return;
    const canvas = canvasRef.current;
    canvas.width = imgWidth * zoom;
    canvas.height = imgHeight * zoom;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    // Draw via offscreen
    const oc = document.createElement('canvas');
    oc.width = imgWidth; oc.height = imgHeight;
    const octx = oc.getContext('2d');
    const id = new ImageData(new Uint8ClampedArray(pixelData), imgWidth, imgHeight);
    octx.putImageData(id, 0, 0);
    ctx.drawImage(oc, 0, 0, imgWidth * zoom, imgHeight * zoom);
    // Grid
    if (zoom >= 4) {
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= imgWidth; x++) {
        ctx.beginPath(); ctx.moveTo(x*zoom, 0); ctx.lineTo(x*zoom, imgHeight*zoom); ctx.stroke();
      }
      for (let y = 0; y <= imgHeight; y++) {
        ctx.beginPath(); ctx.moveTo(0, y*zoom); ctx.lineTo(imgWidth*zoom, y*zoom); ctx.stroke();
      }
    }
  }, [pixelData, zoom, imgWidth, imgHeight]);

  useEffect(() => { renderCanvas(); }, [renderCanvas]);

  const getPixelXY = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    return {
      x: Math.max(0, Math.min(imgWidth-1,  Math.floor((e.clientX - rect.left)  / zoom))),
      y: Math.max(0, Math.min(imgHeight-1, Math.floor((e.clientY - rect.top)   / zoom))),
    };
  };

  const paintAt = (x, y) => {
    const d = new Uint8ClampedArray(pixelData);
    const i = (y * imgWidth + x) * 4;
    if (tool === 'eraser') {
      d[i]=0; d[i+1]=0; d[i+2]=0; d[i+3]=0;
    } else if (tool === 'eyedropper') {
      const r=pixelData[i], g=pixelData[i+1], b=pixelData[i+2];
      setColor('#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join(''));
      return;
    } else {
      const r=parseInt(color.slice(1,3),16), g=parseInt(color.slice(3,5),16), b=parseInt(color.slice(5,7),16);
      d[i]=r; d[i+1]=g; d[i+2]=b; d[i+3]=255;
    }
    setPixelData(d);
  };

  const onMouseDown = (e) => {
    isDrawing.current = true;
    setUndoStack(s => [...s.slice(-29), pixelData]);
    const { x, y } = getPixelXY(e);
    paintAt(x, y);
  };
  const onMouseMove = (e) => {
    if (!isDrawing.current) return;
    const { x, y } = getPixelXY(e);
    paintAt(x, y);
  };
  const onMouseUp   = () => { isDrawing.current = false; };

  const undo = () => {
    if (!undoStack.length) return;
    setPixelData(undoStack[undoStack.length-1]);
    setUndoStack(s => s.slice(0,-1));
  };

  const reset = () => {
    if (!undoStack.length) return;
    setPixelData(undoStack[0]);
    setUndoStack([]);
  };

  const saveEdit = () => {
    const oc = document.createElement('canvas');
    oc.width = imgWidth; oc.height = imgHeight;
    const ctx = oc.getContext('2d');
    ctx.putImageData(new ImageData(new Uint8ClampedArray(pixelData), imgWidth, imgHeight), 0, 0);
    const dataUrl = oc.toDataURL('image/png');
    onSave(asset.id, dataUrl);
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = `${asset.id}_edited.png`;
    a.click();
  };

  const cursorClass = tool === 'pencil' ? 'pixel-cursor' : tool === 'eraser' ? 'eraser-cursor' : 'eyedrop-cursor';

  return (
    <div style={{position:'fixed',inset:0,zIndex:1000,background:'rgba(0,0,0,0.85)',display:'flex',alignItems:'center',justifyContent:'center'}} onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
      <div className="fade-in" style={{background:'#1e293b',border:'1px solid #334155',borderRadius:12,width:'min(92vw,1100px)',height:'min(88vh,760px)',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',padding:'10px 16px',borderBottom:'1px solid #334155',gap:8,flexShrink:0}}>
          <span style={{fontSize:16,fontWeight:600,color:'#e2e8f0',flex:1}}>✏️ Pixel Editor — {asset.name}</span>
          <button onClick={onClose} style={{color:'#64748b',fontSize:18,lineHeight:1,background:'none',border:'none',cursor:'pointer',padding:'2px 6px'}} title="Close">✕</button>
        </div>

        <div style={{display:'flex',flex:1,overflow:'hidden'}}>
          {/* Toolbar */}
          <div style={{width:56,background:'#0f172a',borderRight:'1px solid #334155',display:'flex',flexDirection:'column',alignItems:'center',padding:'12px 0',gap:6,flexShrink:0}}>
            {[['pencil','✏','Pencil'],['eraser','⌫','Eraser'],['eyedropper','🎨','Eyedropper']].map(([t,ic,lbl]) => (
              <button key={t} onClick={()=>setTool(t)} title={lbl}
                style={{width:36,height:36,borderRadius:6,fontSize:16,background:tool===t?'#3730a3':'transparent',border:tool===t?'1px solid #6366f1':'1px solid transparent',cursor:'pointer',color:tool===t?'#a5b4fc':'#64748b'}}>
                {ic}
              </button>
            ))}
            <div style={{width:28,height:1,background:'#334155',margin:'4px 0'}}/>
            {[4,8,16,32].map(z => (
              <button key={z} onClick={()=>setZoom(z)} title={`${z}x zoom`}
                style={{width:36,height:20,borderRadius:4,fontSize:10,background:zoom===z?'#1e3a5f':'transparent',border:zoom===z?'1px solid #3b82f6':'1px solid transparent',cursor:'pointer',color:zoom===z?'#93c5fd':'#64748b'}}>
                {z}x
              </button>
            ))}
          </div>

          {/* Canvas area */}
          <div className="editor-canvas-wrap" style={{flex:1,position:'relative'}}>
            {!loaded && !error && (
              <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',color:'#64748b'}}>Loading sprite…</div>
            )}
            {error && (
              <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:8,color:'#ef4444'}}>
                <span style={{fontSize:32}}>⚠</span>
                <span>Cannot load sprite — check CORS or URL</span>
              </div>
            )}
            {loaded && (
              <div style={{padding:16}}>
                <canvas
                  ref={canvasRef}
                  className={`checkerboard ${cursorClass}`}
                  style={{borderRadius:4,display:'block'}}
                  onMouseDown={onMouseDown}
                  onMouseMove={onMouseMove}
                  onMouseUp={onMouseUp}
                  onMouseLeave={onMouseUp}
                />
              </div>
            )}
          </div>

          {/* Right panel: palette + actions */}
          <div style={{width:180,background:'#0f172a',borderLeft:'1px solid #334155',display:'flex',flexDirection:'column',padding:12,gap:12,flexShrink:0,overflow:'auto'}}>
            {/* Active color */}
            <div>
              <div style={{fontSize:11,color:'#64748b',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.05em'}}>Active Color</div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:32,height:32,borderRadius:4,background:color,border:'2px solid #475569'}}/>
                <input type="color" value={color} onChange={e=>setColor(e.target.value)}
                  style={{width:40,height:32,border:'none',background:'none',cursor:'pointer',padding:0}}/>
              </div>
            </div>

            {/* Palette */}
            <div>
              <div style={{fontSize:11,color:'#64748b',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.05em'}}>LPC Palette</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:2}}>
                {LPC_PALETTE.map(c => (
                  <div key={c} onClick={()=>setColor(c)}
                    style={{width:16,height:16,background:c,borderRadius:2,cursor:'pointer',border:color===c?'2px solid #a5b4fc':'1px solid rgba(255,255,255,0.1)',flexShrink:0}}
                    title={c}/>
                ))}
              </div>
            </div>

            {/* Preview */}
            {loaded && (
              <div>
                <div style={{fontSize:11,color:'#64748b',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.05em'}}>Preview (1x)</div>
                <div className="checkerboard" style={{borderRadius:4,padding:4,display:'inline-block'}}>
                  <canvas ref={el => {
                    if (!el || !pixelData || !imgWidth) return;
                    el.width = imgWidth; el.height = imgHeight;
                    const ctx = el.getContext('2d');
                    ctx.imageSmoothingEnabled = false;
                    ctx.putImageData(new ImageData(new Uint8ClampedArray(pixelData), imgWidth, imgHeight), 0, 0);
                  }} className="pixel-art" style={{display:'block',maxWidth:148}}/>
                </div>
              </div>
            )}

            {/* Undo info */}
            <div style={{fontSize:11,color:'#475569'}}>Undo stack: {undoStack.length}/30</div>
          </div>
        </div>

        {/* Footer actions */}
        <div style={{display:'flex',gap:8,padding:'10px 16px',borderTop:'1px solid #334155',flexShrink:0}}>
          <button onClick={undo} disabled={!undoStack.length}
            style={{padding:'6px 14px',borderRadius:6,background:'#334155',border:'none',color:undoStack.length?'#e2e8f0':'#475569',cursor:undoStack.length?'pointer':'not-allowed',fontSize:13}}>
            ↩ Undo
          </button>
          <button onClick={reset} disabled={!undoStack.length}
            style={{padding:'6px 14px',borderRadius:6,background:'#334155',border:'none',color:undoStack.length?'#e2e8f0':'#475569',cursor:undoStack.length?'pointer':'not-allowed',fontSize:13}}>
            Reset
          </button>
          <div style={{flex:1}}/>
          <button onClick={onClose}
            style={{padding:'6px 14px',borderRadius:6,background:'transparent',border:'1px solid #475569',color:'#94a3b8',cursor:'pointer',fontSize:13}}>
            Cancel
          </button>
          <button onClick={saveEdit} disabled={!loaded}
            style={{padding:'6px 16px',borderRadius:6,background:loaded?'#4f46e5':'#334155',border:'none',color:'#e2e8f0',cursor:loaded?'pointer':'not-allowed',fontSize:13,fontWeight:600}}>
            💾 Save Edit + Download
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// LIGHTBOX MODAL
// ═══════════════════════════════════════════════════════════

function LightboxModal({ asset, state, visibleAssets, onAction, onDecide, onEdit, onClose }) {
  const [note,     setNote]     = useState(state.notes || '');
  const [loadedId, setLoadedId] = useState(null);   // id of asset whose img has loaded
  const [errorId,  setErrorId]  = useState(null);   // id of asset whose img errored
  const [zoom,     setZoom]     = useState(1);
  const [natW,     setNatW]     = useState(0);
  const [natH,     setNatH]     = useState(0);
  const [flash,    setFlash]    = useState(null);
  const imgRef = useRef(null);

  // Derived immediately from current asset.id — no effect needed, no race condition
  const imgLoaded = loadedId === asset.id;
  const imgError  = errorId  === asset.id;

  const url    = state.editedUrl || getLPCUrl(asset.lpcPath);
  const status = state.status || 'pending';

  const currentIdx = visibleAssets.findIndex(a => a.id === asset.id);
  const total      = visibleAssets.length;

  // Reset note and zoom when asset changes (not imgLoaded — that's derived now)
  useEffect(() => {
    setNote(state.notes || '');
    setZoom(1);
  }, [asset.id]);

  useEffect(() => { setNote(state.notes || ''); }, [state.notes]);

  const handleImgLoad = (e) => {
    setNatW(e.target.naturalWidth);
    setNatH(e.target.naturalHeight);
    setLoadedId(asset.id);  // imgLoaded becomes true for THIS asset only
  };

  const navigate = useCallback((dir) => {
    const next = visibleAssets[currentIdx + dir];
    if (next) onAction('__navigate__', next.id);
  }, [currentIdx, visibleAssets, onAction]);

  // decide: Lightbox only owns the flash visual; App owns navigation via onDecide
  const decide = useCallback((action) => {
    setFlash(action);
    onDecide(asset.id, action, note);        // App handles decision + navigation
    setTimeout(() => setFlash(null), 280);   // clear flash after animation
  }, [asset.id, note, onDecide]);

  useEffect(() => {
    const handler = (e) => {
      const tag = e.target.tagName;
      if (tag === 'TEXTAREA' || tag === 'INPUT') return;
      switch (e.key) {
        case 'ArrowRight': case 'ArrowDown': navigate(1);  break;
        case 'ArrowLeft':  case 'ArrowUp':   navigate(-1); break;
        case 'Escape':                       onClose();    break;
        case 'a': case 'A': decide('approved'); break;
        case 'r': case 'R': decide('rejected'); break;
        case 'm': case 'M': decide('maybe');    break;
        case 'f': case 'F': decide('flagged');  break;
        case '+': case '=': setZoom(z => Math.min(z * 2, 16)); break;
        case '-':           setZoom(z => Math.max(z / 2, 0.5)); break;
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [navigate, decide, onClose]);

  const flashBg = flash ? STATUS[flash].dot : 'transparent';

  const displayW = natW ? natW * zoom : null;
  const displayH = natH ? natH * zoom : null;

  return (
    <div
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}
      style={{position:'fixed',inset:0,zIndex:500,background:'rgba(2,6,23,0.97)',display:'flex',alignItems:'center',justifyContent:'center'}}>

      {/* Flash overlay */}
      <div style={{position:'fixed',inset:0,background:flashBg,opacity:flash?0.2:0,pointerEvents:'none',transition:'opacity 0.3s',zIndex:501}}/>

      <div className="fade-in" style={{
        width:'96vw', height:'94vh',
        background:'#0d1729',
        border:'1px solid #1e293b',
        borderRadius:14,
        display:'flex',
        flexDirection:'column',
        overflow:'hidden',
        position:'relative',
        zIndex:502,
      }}>

        {/* ── HEADER ── */}
        <div style={{display:'flex',alignItems:'center',padding:'9px 16px',borderBottom:'1px solid #1e293b',gap:10,flexShrink:0,background:'#0a1120'}}>
          <span className={`${STATUS[status].bg} ${STATUS[status].text}`}
            style={{padding:'2px 10px',borderRadius:20,fontSize:11,fontWeight:700,flexShrink:0}}>
            {STATUS[status].icon} {STATUS[status].label}
          </span>
          <span style={{fontWeight:700,fontSize:16,color:'#e2e8f0',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            {asset.name}
          </span>
          {state.editedUrl && (
            <span style={{fontSize:10,color:'#a3e635',background:'rgba(163,230,53,0.1)',padding:'2px 8px',borderRadius:4,flexShrink:0}}>✦ edited</span>
          )}
          <span style={{fontSize:12,color:'#475569',flexShrink:0}}>{currentIdx + 1} / {total}</span>
          <button onClick={onClose}
            style={{color:'#475569',fontSize:20,background:'none',border:'none',cursor:'pointer',padding:'2px 8px',flexShrink:0,lineHeight:1}}
            title="Close (Esc)">✕</button>
        </div>

        {/* ── BODY ── */}
        <div style={{flex:1,display:'flex',overflow:'hidden'}}>

          {/* ── LEFT ARROW ── */}
          <button onClick={() => navigate(-1)} disabled={currentIdx === 0}
            style={{width:50,background:'transparent',border:'none',
                    cursor:currentIdx>0?'pointer':'default',
                    color:currentIdx>0?'#64748b':'#1e293b',
                    fontSize:36,flexShrink:0,transition:'color 0.15s',
                    display:'flex',alignItems:'center',justifyContent:'center'}}
            title="Previous (←)">‹</button>

          {/* ── IMAGE AREA (dominant, scrollable) ── */}
          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',borderRight:'1px solid #1e293b'}}>

            {/* Scrollable sprite canvas */}
            <div className="checkerboard" style={{
              flex:1,
              overflow:'auto',
              display:'flex',
              alignItems:'center',
              justifyContent:'center',
              padding:24,
            }}>
              {url ? (
                <>
                  {!imgLoaded && !imgError && (
                    <div style={{color:'#334155',fontSize:14}}>Loading…</div>
                  )}
                  {imgError && (
                    <div style={{textAlign:'center',color:'#ef4444',fontSize:13}}>
                      <div style={{fontSize:32,marginBottom:8}}>⚠</div>
                      <div>Failed to load sprite</div>
                      <div style={{fontSize:10,color:'#475569',marginTop:6,maxWidth:300,wordBreak:'break-all'}}>{url}</div>
                    </div>
                  )}
                  <img
                    ref={imgRef}
                    src={url}
                    alt={asset.name}
                    className="pixel-art"
                    style={{
                      width:  displayW || 'auto',
                      height: displayH || 'auto',
                      maxWidth:  zoom <= 1 ? '100%' : 'none',
                      maxHeight: zoom <= 1 ? '100%' : 'none',
                      display: imgLoaded ? 'block' : 'none',
                      imageRendering: 'pixelated',
                    }}
                    onLoad={handleImgLoad}
                    onError={() => setErrorId(asset.id)}
                  />
                </>
              ) : (
                <div style={{textAlign:'center',color:'#475569',padding:32}}>
                  <div style={{fontSize:48,marginBottom:12}}>⚠</div>
                  <div style={{fontSize:15,fontWeight:600,marginBottom:6}}>No sprite available</div>
                  <div style={{fontSize:12,color:'#334155'}}>Needs generation or sourcing</div>

                  {z < 1 ? `${z*100}%` : `${z}x`}
                </button>
              ))}
              {imgLoaded && natW > 0 && (
                <span style={{fontSize:10,color:'#334155',marginLeft:8}}>
                  {natW} × {natH} px {zoom !== 1 && `→ ${Math.round(natW*zoom)} × ${Math.round(natH*zoom)}`}
                </span>
              )}
              <div style={{flex:1}}/>
              <span style={{fontSize:10,color:'#334155'}}>+ / − to zoom</span>
            </div>
          </div>

          {/* ── RIGHT METADATA PANEL ── */}
          <div style={{width:280,flexShrink:0,display:'flex',flexDirection:'column',overflow:'auto',padding:'16px 16px 8px',gap:14}}>

            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <span style={{fontSize:11,color:'#475569',width:54,flexShrink:0}}>Source</span>
                <span style={{fontSize:12,fontWeight:600,
                  color:asset.source==='lpc'?'#34d399':asset.source==='gap'?'#f87171':'#93c5fd'}}>
                  {asset.source === 'lpc' ? '✓ LPC (CC-BY 4.0)' : asset.source === 'gap' ? '⚠ Needs Generation' : asset.source}
                </span>
              </div>
              {asset.lpcPath && (
                <div style={{display:'flex',gap:8,alignItems:'flex-start'}}>
                  <span style={{fontSize:11,color:'#475569',width:54,flexShrink:0}}>Path</span>

            {asset.tags?.length > 0 && (

            )}

            <div>

              <textarea value={note} onChange={e => setNote(e.target.value)}

                style={{width:'100%',height:90,background:'#1e293b',border:'1px solid #334155',borderRadius:6,

            </div>

            {url && (

            <div style={{marginTop:'auto',paddingTop:10,borderTop:'1px solid #1e293b',fontSize:10,color:'#334155',lineHeight:2}}>

  );

// SIDEBAR
// ═══════════════════════════════════════════════════════════

function Sidebar({ activeCategory, onSelect, decisions, assets, collapsed, setCollapsed }) {
  const getStats = (catId) => {
    let all;
    if (catId === 'all') all = assets;
    else if (catId === 'gaps') all = assets.filter(a => a.source === 'gap');
    else all = assets.filter(a => a.subcategory === catId);
    const approved = all.filter(a => (decisions[a.id]?.status||'pending') === 'approved').length;
    return { total: all.length, approved };
  };

  const toggleCollapse = (id, e) => {
    e.stopPropagation();
    setCollapsed(s => ({ ...s, [id]: !s[id] }));
  };

  return (
    <div style={{width:220,background:'#0f172a',borderRight:'1px solid #334155',display:'flex',flexDirection:'column',overflow:'hidden',flexShrink:0}}>
      <div style={{padding:'10px 12px',borderBottom:'1px solid #334155',fontSize:11,color:'#475569',textTransform:'uppercase',letterSpacing:'0.05em',fontWeight:600}}>
        Taxonomy
      </div>
      <div style={{flex:1,overflow:'auto',padding:'6px 0'}}>
        {TAXONOMY.map(group => {
          const gs = getStats(group.id);
          const isCollapsed = collapsed[group.id];
          const isActive = activeCategory === group.id;
          return (
            <div key={group.id}>
              <div className={`tree-item ${isActive ? 'active' : ''}`}
                onClick={() => onSelect(group.id)}
                style={{display:'flex',alignItems:'center',padding:'5px 10px',cursor:'pointer',gap:6,borderLeft:isActive?'2px solid #6366f1':'2px solid transparent'}}>
                <span style={{fontSize:13}}>{group.icon||'◦'}</span>
                <span style={{flex:1,fontSize:13,color:isActive?'#a5b4fc':'#cbd5e1',fontWeight:isActive?600:400,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{group.label}</span>
                {gs.total > 0 && (
                  <span style={{fontSize:10,color:gs.approved===gs.total&&gs.total>0?'#4ade80':'#64748b',background:'#1e293b',borderRadius:10,padding:'1px 6px',flexShrink:0}}>
                    {gs.approved}/{gs.total}
                  </span>
                )}
                {group.children?.length > 0 && (
                  <span onClick={e=>toggleCollapse(group.id,e)} style={{color:'#475569',fontSize:10,flexShrink:0}}>{isCollapsed?'▶':'▼'}</span>
                )}
              </div>
              {!isCollapsed && group.children?.map(child => {
                const cs = getStats(child.id);
                const isCActive = activeCategory === child.id;
                return (
                  <div key={child.id} className={`tree-item ${isCActive ? 'active' : ''}`}
                    onClick={() => onSelect(child.id)}
                    style={{display:'flex',alignItems:'center',padding:'4px 10px 4px 30px',cursor:'pointer',gap:6,borderLeft:isCActive?'2px solid #6366f1':'2px solid transparent'}}>
                    <span style={{flex:1,fontSize:12,color:isCActive?'#a5b4fc':'#94a3b8',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{child.label}</span>
                    {cs.total > 0 && (
                      <span style={{fontSize:10,color:cs.approved===cs.total&&cs.total>0?'#4ade80':'#64748b',background:'#1e293b',borderRadius:10,padding:'1px 5px',flexShrink:0}}>
                        {cs.approved}/{cs.total}
                      </span>
                    )}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

  const applyDecision = useCallback((assetId, action, notes='') => {
    // Navigation signal from lightbox arrows
    if (assetId === '__navigate__') {
      const target = catalog.find(a => a.id === action);
      if (target) setSelectedAsset(target);
      return;
    }
    const asset = catalog.find(a => a.id === assetId);
    setDecisions(prev => ({
      ...prev,
      [assetId]: { ...(prev[assetId]||{}), status: action, notes, decidedAt: new Date().toISOString() }
    }));
    setHistory(prev => [...prev, {
      assetId, assetName: asset?.name || assetId,
      action, notes, timestamp: new Date().toISOString()
    }]);
  }, [catalog]);

  // Ref always holds the latest visibleAssets — no stale-closure risk, no ordering dependency
  const visibleAssetsRef = useRef([]);

  // Called by lightbox decision buttons — App owns navigation so closure is always fresh
  const handleDecide = useCallback((assetId, action, notes) => {
    // Read from ref so we always have the current list regardless of render order
    const list = visibleAssetsRef.current;
    const idx = list.findIndex(a => a.id === assetId);
    const nextAsset = list[idx + 1] ?? null;
    applyDecision(assetId, action, notes);
    // Small delay so the flash colour has time to show, then navigate
    setTimeout(() => {
      setSelectedAsset(nextAsset);
    }, 260);
  }, [applyDecision]);

      needsGeneration: a.needsGeneration || false,

    const summary = {

      rejected: all.filter(a => a.status === 'rejected').length,

        const data = JSON.parse(ev.target.result);
        const newAssets = data.assets || [];
        setCatalog(prev => {
          const ids = new Set(prev.map(a=>a.id));
          return [...prev, ...newAssets.filter(a=>!ids.has(a.id))];

    };
    reader.readAsText(file);

  };

  // Filtered assets
  const visibleAssets = useMemo(() => {
    let list = catalog;
    if (activeCategory === 'gaps') {
      list = list.filter(a => a.source === 'gap');
    } else if (activeCategory !== 'all') {
      list = list.filter(a => a.subcategory === activeCategory);
    }
    if (statusFilter !== 'all') {
      list = list.filter(a => (decisions[a.id]?.status||'pending') === statusFilter);
    }
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(a => a.name.toLowerCase().includes(q) || a.tags?.some(t=>t.includes(q)));
    }
    return list;
  }, [catalog, activeCategory, statusFilter, search, decisions]);
  // Keep ref in sync — runs synchronously during render, before any callbacks fire
  visibleAssetsRef.current = visibleAssets;

  // Stats
  const stats = useMemo(() => {
    const total = catalog.length;
    const approved = catalog.filter(a => (decisions[a.id]?.status||'pending') === 'approved').length;
    const rejected = catalog.filter(a => (decisions[a.id]?.status||'pending') === 'rejected').length;
    const maybe    = catalog.filter(a => (decisions[a.id]?.status||'pending') === 'maybe').length;
    const pending  = total - approved - rejected - maybe - catalog.filter(a=>(decisions[a.id]?.status||'pending')==='flagged').length;
    return { total, approved, rejected, maybe, pending };
  }, [catalog, decisions]);

  const catLabel = useMemo(() => {
    if (activeCategory === 'all') return 'All Assets';
    if (activeCategory === 'gaps') return 'Needs Generation';
    for (const g of TAXONOMY) {
      if (g.id === activeCategory) return g.label;
      for (const c of (g.children||[])) { if (c.id === activeCategory) return `${g.label} / ${c.label}`; }
    }
    return activeCategory;
  }, [activeCategory]);

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
      {/* ── HEADER ── */}
      <div style={{background:'#1e293b',borderBottom:'1px solid #334155',padding:'0 16px',height:50,display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
        <div style={{fontWeight:700,fontSize:15,color:'#a5b4fc',letterSpacing:'-0.01em',flexShrink:0}}>◈ Sprite Review</div>
        <div style={{width:1,height:20,background:'#334155',flexShrink:0}}/>

        {/* Search */}
        <div style={{position:'relative',flex:'1 1 200px',maxWidth:280}}>
          <span style={{position:'absolute',left:8,top:'50%',transform:'translateY(-50%)',color:'#475569',pointerEvents:'none'}}>⌕</span>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Search assets…"
            style={{width:'100%',background:'#0f172a',border:'1px solid #334155',borderRadius:6,padding:'5px 8px 5px 26px',color:'#e2e8f0',fontSize:13,outline:'none'}}
          />
        </div>

        {/* Status filter tabs */}
        <div style={{display:'flex',gap:2,background:'#0f172a',borderRadius:6,padding:2,border:'1px solid #334155'}}>
          {['all','pending','approved','rejected','maybe','flagged'].map(f => (
            <button key={f} onClick={()=>setStatusFilter(f)}
              style={{padding:'3px 10px',borderRadius:4,background:statusFilter===f?'#334155':'transparent',border:'none',cursor:'pointer',
                      color:statusFilter===f?'#e2e8f0':'#64748b',fontSize:11,fontWeight:statusFilter===f?600:400,whiteSpace:'nowrap'}}>
              {f==='all'?'All':STATUS[f]?.label}
            </button>
          ))}
        </div>

        <div style={{flex:1}}/>

        {/* Global stats */}
        <div style={{display:'flex',gap:12,fontSize:11,color:'#64748b',flexShrink:0}}>
          {[['✓',stats.approved,'#4ade80'],['✗',stats.rejected,'#f87171'],['?',stats.maybe,'#fbbf24'],['○',stats.pending,'#64748b']].map(([ic,n,c]) => (
            <span key={ic} style={{color:c}}>{ic} {n}</span>
          ))}
        </div>

        <div style={{width:1,height:20,background:'#334155',flexShrink:0}}/>

        {/* Actions */}
        <label title="Import asset batch JSON" style={{padding:'5px 10px',borderRadius:6,background:'transparent',border:'1px solid #334155',color:'#94a3b8',cursor:'pointer',fontSize:12,flexShrink:0}}>
          ↑ Import
          <input type="file" accept=".json" style={{display:'none'}} onChange={importBatch}/>
        </label>
        <button onClick={exportAllDecisions} title="Export all decisions (all statuses)"
          style={{padding:'5px 10px',borderRadius:6,background:'rgba(16,185,129,0.2)',border:'1px solid rgba(52,211,153,0.4)',color:'#6ee7b7',cursor:'pointer',fontSize:12,flexShrink:0}}>
          ↓ All Decisions
        </button>
        <button onClick={exportApproved} title="Export approved assets only"
          style={{padding:'5px 10px',borderRadius:6,background:'rgba(79,70,229,0.2)',border:'1px solid rgba(99,102,241,0.4)',color:'#a5b4fc',cursor:'pointer',fontSize:12,flexShrink:0}}>
          ↓ Approved
        </button>
        <button onClick={exportHistory} title="Export decision history"
          style={{padding:'5px 10px',borderRadius:6,background:'transparent',border:'1px solid #334155',color:'#64748b',cursor:'pointer',fontSize:12,flexShrink:0}}>
          📋 Log
        </button>
        <button onClick={resetAll} title="Reset all decisions"
          style={{padding:'5px 8px',borderRadius:6,background:'transparent',border:'1px solid #334155',color:'#475569',cursor:'pointer',fontSize:12,flexShrink:0}}>
          ↺
        </button>
      </div>

      {/* ── BODY ── */}
      <div style={{flex:1,display:'flex',overflow:'hidden'}}>
        {/* Sidebar */}
        <Sidebar
          activeCategory={activeCategory}
          onSelect={cat => { setActiveCategory(cat); setSelectedAsset(null); }}
          decisions={decisions}
          assets={catalog}
          collapsed={collapsed}
          setCollapsed={setCollapsed}
        />

        {/* Main content */}
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          {/* Category header */}
          <div style={{padding:'8px 16px',borderBottom:'1px solid #334155',display:'flex',alignItems:'center',gap:10,flexShrink:0,background:'#131d2e'}}>
            <span style={{fontWeight:600,fontSize:14,color:'#e2e8f0'}}>{catLabel}</span>
            <span style={{fontSize:12,color:'#475569'}}>{visibleAssets.length} assets</span>
            <div style={{flex:1}}/>
            {/* Progress bar */}
            {catalog.length > 0 && (() => {
              const catAssets = activeCategory==='all' ? catalog : activeCategory==='gaps' ? catalog.filter(a=>a.source==='gap') : catalog.filter(a=>a.subcategory===activeCategory);
              const done = catAssets.filter(a=>['approved','rejected'].includes(decisions[a.id]?.status||'pending')).length;
              const pct = catAssets.length ? Math.round(done/catAssets.length*100) : 0;
              return (
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:11,color:'#475569'}}>{done}/{catAssets.length} reviewed</span>
                  <div style={{width:80,height:4,background:'#1e293b',borderRadius:2,overflow:'hidden'}}>
                    <div style={{width:`${pct}%`,height:'100%',background:'#4f46e5',borderRadius:2,transition:'width 0.3s'}}/>
                  </div>
                  <span style={{fontSize:11,color:'#6366f1'}}>{pct}%</span>
                </div>
              );
            })()}
          </div>

          {/* Grid + detail */}
          <div style={{flex:1,display:'flex',overflow:'hidden'}}>
            {/* Grid */}
            <div style={{flex:1,overflow:'auto',padding:16}}>
              {visibleAssets.length === 0 ? (
                <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:'#475569',flexDirection:'column',gap:6}}>
                  <div style={{fontSize:32}}>◈</div>
                  <div>No assets match this filter</div>
                  <div style={{fontSize:11,color:'#334155'}}>Try changing category or status filter</div>
                </div>
              ) : (
                <div className="fade-in" style={{display:'flex',flexWrap:'wrap',gap:12,alignContent:'flex-start'}}>
                  {visibleAssets.map(asset => (
                    <AssetCard
                      key={asset.id}
                      asset={asset}
                      state={decisions[asset.id]||{}}
                      onSelect={setSelectedAsset}
                      onAction={applyDecision}
                    />
                  ))}
                </div>
              )}
            </div>

  {/* (detail panel removed — now a lightbox) */}
          </div>

          {/* History panel */}
          <HistoryPanel history={history} isOpen={historyOpen} onToggle={()=>setHistoryOpen(o=>!o)}/>
        </div>
      </div>

      {/* Lightbox modal */}
      {selectedAsset && !editingAsset && (
        <LightboxModal
          asset={selectedAsset}
          state={decisions[selectedAsset.id]||{}}
          visibleAssets={visibleAssets}
          onAction={applyDecision}
          onDecide={handleDecide}
          onEdit={setEditingAsset}
          onClose={() => setSelectedAsset(null)}
        />
      )}

      {/* Pixel editor modal */}
      {editingAsset && (
        <PixelEditor
          asset={editingAsset}
          editedUrl={decisions[editingAsset.id]?.editedUrl}
          onSave={saveEdit}
          onClose={() => setEditingAsset(null)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
